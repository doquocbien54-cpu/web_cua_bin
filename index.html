<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      href="https://i.postimg.cc/qvjz8QFW/Logo.png"
    />
    <title>The Life of a Singularity</title>
    <link rel="stylesheet" href="style/style.css" />
  </head>

  <body>
    <div id="star-bg"></div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/",
          "gsap": "https://unpkg.com/gsap@3.12.5/index.js"
        }
      }
    </script>

    <div id="vignette"></div>
    <div id="overlay">
      <div class="header">
        <div class="title" id="main-title">Stable Singularity</div>
        <div class="status-pill" id="status-text">Topology: Nominal</div>
      </div>
      <div class="hud-bottom">
        <div>
          <div class="metric">
            MASS_INDEX: <span class="val">4.2M SOL</span>
          </div>
          <div class="metric">
            LENSING: <span class="val" id="lensing-val">SCHWARZSCHILD</span>
          </div>
        </div>
        <div style="text-align: right">
          <div class="metric">
            RELATIVITY: <span class="val" id="vel-val">0.45c</span>
          </div>
          <div class="metric">
            RADIATION: <span class="val">DETECTION ON</span>
          </div>
        </div>
      </div>
    </div>

    <script
      async
      src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"
    ></script>
    <script type="module" src="style/script.js"></script>
  </body>
</html>
